<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COH1 Replay Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --olive:#4a5240; --olive-lt:#6b7560; --cream:#e8e2d0;
  --carbon:#141410; --ink:#1e1e18; --ink2:#252520;
  --rust:#c0601a; --rust-lt:#d97030;
  --brit:#2e7d4f; --panz:#8a4a1a; --wehr:#5a5a3a; --usa:#3a6ea8;
  --team0:#3a6ea8; --team1:#b84040;
  --font-d:'Bebas Neue',Impact,sans-serif; --font-b:'Inter',system-ui,sans-serif;
}
body { background:var(--carbon); color:var(--cream); font-family:var(--font-b); min-height:100vh; }
header { border-bottom:2px solid var(--olive); padding:1.25rem 2rem; display:flex; align-items:baseline; gap:1rem; }
header h1 { font-family:var(--font-d); font-size:clamp(1.8rem,4vw,3rem); letter-spacing:.04em; line-height:1; }
header span { font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color:var(--olive-lt); }
main { display:flex; flex-direction:column; align-items:center; padding:2.5rem 1.5rem 4rem; gap:2rem; }
.drop-zone { width:100%; max-width:540px; border:2px dashed var(--olive); border-radius:4px; padding:2.5rem 2rem; text-align:center; cursor:pointer; position:relative; transition:border-color .2s,background .2s; }
.drop-zone:hover,.drop-zone.drag-over { border-color:var(--rust); background:rgba(192,96,26,.06); }
.drop-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.drop-icon { font-size:2.2rem; display:block; margin-bottom:.6rem; }
.drop-zone .label { font-family:var(--font-d); font-size:1.3rem; letter-spacing:.05em; }
.drop-zone .hint { margin-top:.35rem; font-size:.72rem; color:var(--olive-lt); letter-spacing:.08em; text-transform:uppercase; }
.drop-zone .fname { margin-top:.7rem; font-size:.82rem; color:var(--rust); font-weight:600; }
.btn { font-family:var(--font-d); font-size:1.2rem; letter-spacing:.1em; background:var(--rust); color:var(--cream); border:none; padding:.7rem 2.2rem; border-radius:2px; cursor:pointer; transition:background .15s,transform .1s; }
.btn:hover { background:var(--rust-lt); }
.btn:active { transform:scale(.98); }
.btn:disabled { background:var(--olive); cursor:not-allowed; opacity:.6; }
.spinner { width:26px; height:26px; border:3px solid var(--olive); border-top-color:var(--rust); border-radius:50%; animation:spin .7s linear infinite; display:none; }
.spinner.active { display:block; }
@keyframes spin { to { transform:rotate(360deg); } }
.status-msg { font-size:.8rem; letter-spacing:.06em; text-transform:uppercase; color:var(--olive-lt); text-align:center; max-width:500px; }
.status-msg.error { color:#e05555; }
#results { width:100%; max-width:820px; display:none; flex-direction:column; gap:1.75rem; animation:fadeUp .4s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
#results.visible { display:flex; }
.meta-bar { background:var(--ink); border:1px solid var(--olive); border-radius:4px; padding:1.2rem 1.5rem; display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:.9rem 1.5rem; }
.meta-item label { display:block; font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; color:var(--olive-lt); margin-bottom:.2rem; }
.meta-item .val { font-family:var(--font-d); font-size:1.35rem; letter-spacing:.03em; line-height:1.1; }
.meta-item .val.sm { font-family:var(--font-b); font-size:.88rem; font-weight:600; }
.badge-type { display:inline-block; font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; padding:.1rem .45rem; border-radius:2px; border:1px solid var(--olive); color:var(--olive-lt); margin-left:.4rem; vertical-align:middle; }
.badge-type.ranked { border-color:var(--rust); color:var(--rust); }
.sh { font-family:var(--font-d); font-size:1rem; letter-spacing:.12em; color:var(--olive-lt); text-transform:uppercase; border-bottom:1px solid var(--olive); padding-bottom:.35rem; margin-bottom:.75rem; }
.players-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:1rem; }
.player-card { background:var(--ink); border:1px solid var(--olive); border-radius:4px; padding:1.25rem 1.4rem; position:relative; overflow:hidden; }
.player-card::before { content:''; position:absolute; left:0;top:0;bottom:0; width:4px; }
.player-card.team-0::before { background:var(--team0); }
.player-card.team-1::before { background:var(--team1); }
.fac-badge { display:inline-block; font-family:var(--font-d); font-size:.82rem; letter-spacing:.12em; padding:.12rem .5rem; border-radius:2px; margin-bottom:.55rem; }
.f-USA  { background:rgba(58,110,168,.22); color:#7aabdc; border:1px solid var(--usa); }
.f-BRIT { background:rgba(46,125,79,.22);  color:#6ec99a; border:1px solid var(--brit); }
.f-WEHR { background:rgba(90,90,58,.22);   color:#b8b87a; border:1px solid var(--wehr); }
.f-PANZ { background:rgba(138,74,26,.22);  color:#d4956a; border:1px solid var(--panz); }
.player-name { font-family:var(--font-d); font-size:1.45rem; letter-spacing:.03em; line-height:1.1; word-break:break-word; }
.player-sub { margin-top:.35rem; font-size:.72rem; letter-spacing:.08em; text-transform:uppercase; color:var(--olive-lt); }
.player-sub .hl { color:var(--cream); }
.team-lbl { position:absolute; top:.7rem; right:1rem; font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; color:var(--olive-lt); }
.result-won { color:#6ec99a; font-weight:600; }
.result-lost { color:#e05555; font-weight:600; }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:1rem; }
.stat-panel { background:var(--ink); border:1px solid var(--olive); border-radius:4px; padding:1.1rem 1.3rem; }
.stat-panel-title { font-family:var(--font-d); font-size:1.1rem; letter-spacing:.04em; color:var(--cream); margin-bottom:.6rem; padding-bottom:.4rem; border-bottom:1px solid var(--olive); display:flex; justify-content:space-between; align-items:center; }
.stat-panel-title small { font-family:var(--font-b); font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:var(--olive-lt); }
.stat-kv { display:flex; flex-direction:column; gap:.15rem; }
.stat-row { display:flex; justify-content:space-between; align-items:baseline; font-size:.8rem; padding:.16rem 0; border-bottom:1px solid rgba(74,82,64,.3); }
.stat-row:last-child { border-bottom:none; }
.stat-row .sname { color:var(--cream); flex:1; margin-right:.5rem; }
.stat-row .scnt { color:var(--rust); font-weight:600; font-size:.75rem; flex-shrink:0; }
.sub-heading { font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; color:var(--olive-lt); margin:.65rem 0 .25rem; }
.filter-bar { display:flex; gap:.35rem; flex-wrap:wrap; margin-bottom:.6rem; }
.filter-btn { font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; padding:.2rem .55rem; border-radius:2px; border:1px solid var(--olive); background:transparent; color:var(--olive-lt); cursor:pointer; transition:all .15s; }
.filter-btn:hover { border-color:var(--cream); color:var(--cream); }
.filter-btn.active { background:var(--rust); border-color:var(--rust); color:var(--cream); }
.timeline { display:flex; flex-direction:column; gap:.16rem; max-height:440px; overflow-y:auto; padding-right:.3rem; }
.timeline::-webkit-scrollbar { width:4px; }
.timeline::-webkit-scrollbar-track { background:var(--ink); }
.timeline::-webkit-scrollbar-thumb { background:var(--olive); border-radius:2px; }
.tl-event { display:flex; align-items:center; gap:.55rem; background:var(--ink2); border:1px solid rgba(74,82,64,.4); border-radius:2px; padding:.26rem .6rem; font-size:.78rem; }
.tl-time { color:var(--rust); font-weight:600; flex-shrink:0; width:3.2rem; font-size:.71rem; }
.tl-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.tl-dot.team-0 { background:var(--team0); }
.tl-dot.team-1 { background:var(--team1); }
.tl-type { flex-shrink:0; font-size:.64rem; letter-spacing:.09em; text-transform:uppercase; width:5rem; }
.tl-name { color:var(--cream); }
.type-MAKE { color:#7aabdc; }
.type-BUILD { color:#b8b87a; }
.type-UPGRADE { color:#d4956a; }
.type-ABILITY { color:#9acd6a; }
.type-GLOBAL { color:#c87ad4; }
.type-DOCTRINAL { color:#d4ca6a; }
.type-SELECT_DOCTRINE { color:#6ac4d4; }
/* Chat */
.chat-log { display:flex; flex-direction:column; gap:.3rem; }
.chat-msg { background:var(--ink2); border:1px solid rgba(74,82,64,.4); border-radius:2px; padding:.3rem .7rem; font-size:.8rem; }
.chat-msg .chat-sender { color:var(--rust); font-weight:600; margin-right:.4rem; }
.chat-msg .chat-text { color:var(--cream); }
.no-chat { font-size:.75rem; color:var(--olive-lt); letter-spacing:.06em; text-transform:uppercase; }
footer { text-align:center; padding:1.5rem; font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:var(--olive); border-top:1px solid var(--olive); }
@media(max-width:520px) { header{flex-direction:column;gap:.2rem} .meta-bar{grid-template-columns:1fr 1fr} }
</style>
</head>
<body>
<header>
  <h1>COH1 Replay Analyzer</h1>
  <span>Company of Heroes</span>
</header>
<main>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".rec">
    <span class="drop-icon">🎖️</span>
    <p class="label">Drop your replay here</p>
    <p class="hint">.rec files only</p>
    <p class="fname" id="selectedName"></p>
  </div>
  <button class="btn" id="analyzeBtn" disabled>Analyze Replay</button>
  <div class="spinner" id="spinner"></div>
  <p class="status-msg" id="statusMsg"></p>
  <section id="results">
    <div class="meta-bar" id="metaBar"></div>
    <div><p class="sh">Players</p><div class="players-grid" id="playersGrid"></div></div>
    <div><p class="sh">Statistics</p><div class="stats-grid" id="statsGrid"></div></div>
    <div><p class="sh">Timeline</p><div class="filter-bar" id="filterBar"></div><div class="timeline" id="timeline"></div></div>
    <div id="chatSection"><p class="sh">Chat</p><div class="chat-log" id="chatLog"></div></div>
  </section>
</main>
<footer>Powered by C2A.EXE — COH/COH2 Analyzer by dyxtra</footer>
<script>
const API_URL = window.location.hostname === "localhost"
  ? "http://localhost:5000/parse"
  : "https://coh1-analyzer-api.onrender.com/parse";

const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput'),
      analyzeBtn=document.getElementById('analyzeBtn'),spinner=document.getElementById('spinner'),
      statusMsg=document.getElementById('statusMsg'),results=document.getElementById('results'),
      selName=document.getElementById('selectedName');

let selectedFile=null, allEvents=[], activeFilter='ALL', playerTeams={};

fileInput.addEventListener('change',()=>{ if(fileInput.files[0]) setFile(fileInput.files[0]); });
dropZone.addEventListener('dragover',e=>{ e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{ e.preventDefault(); dropZone.classList.remove('drag-over'); const f=e.dataTransfer.files[0]; if(f&&f.name.toLowerCase().endsWith('.rec')) setFile(f); else showStatus('Only .rec files are supported.',true); });

function setFile(f){ selectedFile=f; selName.textContent=f.name; analyzeBtn.disabled=false; results.classList.remove('visible'); showStatus(''); }

analyzeBtn.addEventListener('click', async()=>{
  if(!selectedFile) return;
  analyzeBtn.disabled=true; spinner.classList.add('active');
  showStatus('Analyzing… (first request may take ~30s to wake the server)');
  results.classList.remove('visible');
  try {
    const form=new FormData(); form.append('replay',selectedFile);
    const resp=await fetch(API_URL,{method:'POST',body:form});
    const data=await resp.json();
    if(!resp.ok) throw new Error(data.error||`Server error ${resp.status}`);
    renderResults(data); showStatus('');
  } catch(err){ showStatus(err.message,true); }
  finally { spinner.classList.remove('active'); analyzeBtn.disabled=false; }
});

function renderResults(d){
  playerTeams={};
  // FIX: ahora p.mpn existe en cada jugador (añadido por app.py v5)
  (d.players||[]).forEach(p=>{ playerTeams[p.mpn]=p.team; });

  const typeLabel=(d.game_type||'')==='ranked'
    ?'<span class="badge-type ranked">Ranked</span>'
    :'<span class="badge-type">Unranked</span>';
  document.getElementById('metaBar').innerHTML=`
    <div class="meta-item"><label>Map</label><div class="val">${esc(d.map_name)}</div></div>
    <div class="meta-item"><label>Duration</label><div class="val">${esc(d.duration)}</div></div>
    <div class="meta-item"><label>Date</label><div class="val sm">${esc(d.game_time)}</div></div>
    <div class="meta-item"><label>Version</label><div class="val sm">${esc(d.game_version)}${typeLabel}</div></div>`;

  const facNames={USA:'US Forces',BRIT:'British Forces',WEHR:'Wehrmacht',PANZ:'Panzer Elite'};
  document.getElementById('playersGrid').innerHTML=(d.players||[]).map(p=>{
    // FIX: p.faction ya es el short form (USA/BRIT/WEHR/PANZ) gracias a app.py v5
    // FIX: p.result ahora existe
    const rHtml=p.result==='Won'?'<span class="result-won">✓ Won</span>':p.result==='Lost'?'<span class="result-lost">✗ Lost</span>':'';
    // FIX: stats usa p.mpn
    const doc=(d.stats||{})[String(p.mpn)]?.doctrine||'';
    return `<div class="player-card team-${p.team}">
      <span class="team-lbl">Team ${p.team+1}</span>
      <span class="fac-badge f-${esc(p.faction)}">${esc(p.faction)} — ${esc(facNames[p.faction]||p.faction)}</span>
      <div class="player-name">${esc(p.name)}</div>
      <div class="player-sub">
        <span class="hl">${esc(p.type)}</span>
        ${doc?` &nbsp;·&nbsp; <span class="hl">${esc(doc)}</span>`:''}
        ${rHtml?` &nbsp;·&nbsp; ${rHtml}`:''}</div></div>`;
  }).join('');

  const sg=document.getElementById('statsGrid'); sg.innerHTML='';
  (d.players||[]).forEach(p=>{
    // FIX: stats keyed by p.mpn
    const s=(d.stats||{})[String(p.mpn)]; if(!s) return;
    const panel=document.createElement('div'); panel.className='stat-panel';
    let html=`<div class="stat-panel-title"><span>${esc(p.name)}</span><small>CPM ${s.cpm} &nbsp;·&nbsp; +${s.reinforce} reinf &nbsp;·&nbsp; ${s.retreat} ret</small></div>`;
    [['Units Produced',s.units],['Buildings',s.buildings],['Upgrades',s.upgrades],['Global Upgrades',s.globals],['Doctrinals',s.doctrinals]].forEach(([title,obj])=>{
      const entries=Object.entries(obj||{}); if(!entries.length) return;
      html+=`<div class="sub-heading">${title}</div><div class="stat-kv">`;
      entries.forEach(([n,c])=>{ html+=`<div class="stat-row"><span class="sname">${esc(n)}</span><span class="scnt">×${c}</span></div>`; });
      html+=`</div>`;
    });
    panel.innerHTML=html; sg.appendChild(panel);
  });

  // FIX: eventos ahora usan .mpn / .type / .name (renombrados en app.py v5)
  const SKIP=new Set(['CANCEL','CANCEL_BUILDING','PICKUP_WEAPON','AI_TAKEOVER','REINFORCE','RETREAT']);
  allEvents=(d.events||[]).filter(e=>!SKIP.has(e.type));
  buildFilterBar(d.players||[]);
  renderTimeline();

  // Chat (existía en parser pero nunca se mostraba)
  const chatLog=document.getElementById('chatLog');
  const chatSection=document.getElementById('chatSection');
  const chatMsgs=d.chat||[];
  if(chatMsgs.length){
    chatSection.style.display='';
    chatLog.innerHTML=chatMsgs.map(m=>{
      // Formato típico de COH: "PlayerName: mensaje"
      const sep=m.indexOf(':');
      if(sep>0&&sep<30){
        return `<div class="chat-msg"><span class="chat-sender">${esc(m.slice(0,sep))}</span><span class="chat-text">${esc(m.slice(sep+1).trim())}</span></div>`;
      }
      return `<div class="chat-msg"><span class="chat-text">${esc(m)}</span></div>`;
    }).join('');
  } else {
    chatSection.style.display='none';
  }

  results.classList.add('visible');
  results.scrollIntoView({behavior:'smooth',block:'start'});
}

function buildFilterBar(players){
  const bar=document.getElementById('filterBar'); bar.innerHTML=''; activeFilter='ALL';
  const mk=(label,val)=>{
    const btn=document.createElement('button');
    btn.className='filter-btn'+(val==='ALL'?' active':'');
    btn.textContent=label; btn.dataset.filter=val;
    btn.addEventListener('click',()=>{
      activeFilter=val;
      bar.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter===val));
      renderTimeline();
    });
    bar.appendChild(btn);
  };
  mk('All','ALL');
  // FIX: filtro por jugador usa p.mpn
  players.forEach(p=>mk(p.name.split(/[\s|]+/).pop(),'MPN:'+p.mpn));
  ['MAKE','BUILD','UPGRADE','ABILITY','GLOBAL','DOCTRINAL'].forEach(t=>mk(t[0]+t.slice(1).toLowerCase(),'TYPE:'+t));
}

function renderTimeline(){
  const tl=document.getElementById('timeline');
  const filtered=allEvents.filter(e=>{
    if(activeFilter==='ALL') return true;
    // FIX: e.mpn (ya renombrado por app.py v5)
    if(activeFilter.startsWith('MPN:')) return e.mpn===parseInt(activeFilter.slice(4));
    // FIX: e.type (ya renombrado)
    if(activeFilter.startsWith('TYPE:')) return e.type===activeFilter.slice(5);
    return true;
  });
  tl.innerHTML=filtered.map(e=>{
    const team=playerTeams[e.mpn]??0;
    return `<div class="tl-event">
      <span class="tl-time">${esc(e.time_str)}</span>
      <span class="tl-dot team-${team}"></span>
      <span class="tl-type type-${esc(e.type)}">${esc(e.type)}</span>
      <span class="tl-name">${esc(e.name)}</span>
    </div>`;
  }).join('');
}

function showStatus(msg,isError=false){ statusMsg.textContent=msg; statusMsg.className='status-msg'+(isError?' error':''); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
